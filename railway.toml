[build]
builder = "nixpacks"

[deploy]
startCommand = "node leadsprint-agent/autonomous-agent.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[build.env]
NIXPACKS_BUILD_COMMAND = "npm ci --production"
NIXPACKS_SKIP_BUILD = "true"

[[services]]
name = "web"

[services.variables]
NODE_ENV = "production"
PORT = "8080"